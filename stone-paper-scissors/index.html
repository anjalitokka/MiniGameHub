<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stone Paper Scissors</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <button class="homeBtn" onclick="goHome()">
        🏠 Home
    </button>

    <!-- START SCREEN -->
    <div class="image-container">

        <h1 id="first">Stone Paper Scissors</h1>

        <img id="tempo"
            src="https://play-lh.googleusercontent.com/_2r5lzUG2bF1DkiSp_Mp-nbRi4dezQsSuxYfffwsIGFg7-dqaZwfgY2Pk78IqwEkV8lM"
            alt="Game Image">

        <button id="play">PLAY</button>

    </div>


    <!-- GAME TITLE -->
    <h2 class="game-title hide">Choose Your Move</h2>


    <!-- CHOICES -->
    <div class="choices hide">

        <div class="choice" id="rock">
            <img src="https://www.pngitem.com/pimgs/m/226-2260873_transparent-rock-paper-scissors-png-png-download.png"
                alt="Rock">
        </div>

        <div class="choice" id="paper">
            <img src="https://www.pngitem.com/pimgs/m/266-2667795_rock-paper-scissors-png-transparent-png.png"
                alt="Paper">
        </div>

        <div class="choice" id="scissors">
            <img src="https://media.geeksforgeeks.org/wp-content/uploads/20210705223721/scissor.jpeg" alt="Scissors">
        </div>

    </div>
    <div class="move-container hide">

        <div class="move-box">
            <h2>You Chose</h2>
            <img id="user-move" src="" alt="User Move">
        </div>
        <!-- MESSAGE -->
        <div class="msg-container">
            <p id="msg">Play your move!</p>
        </div>

        <div class="move-box">
            <h2>Computer Chose</h2>
            <img id="comp-move" src="" alt="Computer Move">
        </div>

    </div>


    <!-- SCORE BOARD -->
    <section class="score-board hide">

        <div class="score">
            <p id="user-score">0</p>
            <p>USER</p>
        </div>

        <div class="score">
            <p id="comp-score">0</p>
            <p>COMP</p>
        </div>

    </section>


    <!-- MESSAGE -->
    <div class="msg-container hide">

        <p id="msg">Play your move!</p>

    </div>


    <!-- RESET BUTTON -->
    <div class="reset-container hide">

        <button id="reset">Reset Game</button>

    </div>


    <script src="script.js"></script>

</body>

</html>
